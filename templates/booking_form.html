<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Package</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">
<div class="card p-4">

<h3 class="mb-3">Book: {{ package.title }}</h3>
<p><b>Price:</b> ₹ {{ package.price }}</p>

<form method="post">
{% csrf_token %}

<div class="row">
<div class="col-md-6 mb-3">
<label>Full Name</label>
<input name="full_name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input name="phone" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input name="email" type="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Persons</label>
<input name="persons" type="number" value="1" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Travel Date</label>
<input name="travel_date" type="date" class="form-control" required placeholder="dd-mm-yyyy">
</div>

<button class="btn btn-dark w-100">Confirm Booking</button>

</form>
</div>
</div>

</body>
</html>
