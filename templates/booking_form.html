<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">
<div class="card p-4 shadow">

<!-- ✅ DYNAMIC TITLE -->
{% if package %}
<h3 class="mb-3">Book: {{ package.name }}</h3>
<p><b>Price per person:</b> ₹ {{ package.price }}</p>
{% elif room %}
<h3 class="mb-3">Book Room: {{ room.room_type }}</h3>
<p><b>Price per night:</b> ₹ {{ room.price_per_night }}</p>
{% endif %}

<hr>

<!-- ✅ DYNAMIC FORM ACTION -->
{% if package %}
<form method="post" action="{% url 'book_package' package.id %}">
{% else %}
<form method="post">
{% endif %}

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input name="name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input name="phone" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input name="email" type="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Number of Persons</label>
<input name="guests" type="number" value="1" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Travel / Check-in Date</label>
<input name="checkin" type="date" class="form-control" required>
</div>

{% if room %}
<div class="col-md-6 mb-3">
<label>Check-out Date</label>
<input name="checkout" type="date" class="form-control" required>
</div>
{% endif %}

</div>

<hr>

<button type="submit" class="btn btn-success w-100">
Proceed to Payment
</button>

</form>

</div>
</div>

</body>
</html>
