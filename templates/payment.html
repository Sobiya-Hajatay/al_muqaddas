<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment | Al Muqaddas Tours & Travels</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:0;
}

.header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    width:400px;
    margin:60px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
}

.detail{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-size:16px;
}

.amount{
    font-size:22px;
    font-weight:bold;
    color:#27ae60;
    text-align:center;
    margin:20px 0;
}

.pay-btn{
    width:100%;
    padding:15px;
    background:#27ae60;
    color:white;
    border:none;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
}

.pay-btn:hover{
    background:#219150;
}

.secure{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#555;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:#888;
}

</style>
</head>

<body>

<div class="header">
AL MUQADDAS TOURS & TRAVELS
</div>

<div class="container">

<div class="card">

<h2>Secure Payment</h2>

<div class="detail">
<span>Booking ID</span>
<span>{{ booking.id }}</span>
</div>

<div class="detail">
<span>Customer</span>
<span>{{ booking.customer_name }}</span>
</div>

<div class="detail">
<span>Package</span>
<span>{{ booking.package.name }}</span>
</div>

<div class="amount">
Amount Payable: ₹{{ booking.amount }}
</div>

<form action="{% url 'create_order' booking.id %}" method="POST">
{% csrf_token %}

<button class="pay-btn">
Pay ₹{{ booking.amount }} Now
</button>

</form>

<div class="secure">
🔒 100% Secure Payment <br>
Powered by Razorpay
</div>

<div class="footer">
Need Help? Contact Al Muqaddas Tours & Travels
</div>

</div>

</div>

</body>
</html>
