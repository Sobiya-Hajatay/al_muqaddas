<!DOCTYPE html>
<html>
<head>
<title>Secure Payment | Al Muqaddas</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.title{
font-size:22px;
margin-bottom:20px;
}

.details{
text-align:left;
margin-top:20px;
}

.details p{
margin:8px 0;
}

.paybtn{
margin-top:20px;
width:100%;
padding:14px;
font-size:18px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.secure{
margin-top:15px;
font-size:13px;
color:gray;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
AL MUQADDAS TOURS & TRAVELS
</div>

<div class="details">
<p><b>Booking ID:</b> {{ booking.id }}</p>
<p><b>Name:</b> {{ booking.full_name }}</p>
<p><b>Total Amount:</b> ₹{{ booking.total_amount }}</p>
</div>

<button id="rzp-button1" class="paybtn">
Pay Now ₹{{ booking.total_amount }}
</button>

<div class="secure">
🔒 100% Secure Payment <br>
Powered by Razorpay
</div>

</div>

<script>

var options = {
    key: "{{ razorpay_key }}",
    amount: {{ amount }},
    currency: "INR",
    name: "Al Muqaddas Tours",
    description: "Umrah Booking Payment",
    order_id: "{{ order_id }}",

    handler: function (response) {

        var form = document.createElement("form");
        form.method = "POST";
        form.action = "/booking/payment-success/";

        var csrf = document.createElement("input");
        csrf.type = "hidden";
        csrf.name = "csrfmiddlewaretoken";
        csrf.value = "{{ csrf_token }}";
        form.appendChild(csrf);

        function addField(name, value) {
            var input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            form.appendChild(input);
        }

        addField("razorpay_payment_id", response.razorpay_payment_id);
        addField("razorpay_order_id", response.razorpay_order_id);
        addField("razorpay_signature", response.razorpay_signature);
        addField("booking_id", "{{ booking.id }}");

        document.body.appendChild(form);
        form.submit();
    },

    theme: {
        color: "#28a745"
    }
};

var rzp1 = new Razorpay(options);

document.getElementById("rzp-button1").onclick = function (e) {
    rzp1.open();
    e.preventDefault();
};

</script>

</body>
</html>
