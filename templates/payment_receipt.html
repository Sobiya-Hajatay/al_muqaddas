<!DOCTYPE html>
<html>
<head>

<title>Payment Receipt</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:green;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.actions{
margin-top:30px;
text-align:center;
}

.btn{
padding:10px 20px;
text-decoration:none;
background:#007bff;
color:white;
border-radius:5px;
margin:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Payment Successful</h2>

<p style="text-align:center;">
Your booking payment has been received.
</p>

<table>

<tr>
<td><b>Booking Ref</b></td>
<td>{{ booking.booking_ref }}</td>
</tr>

<tr>
<td><b>Package</b></td>
<td>{{ booking.package }}</td>
</tr>

<tr>
<td><b>Travel Date</b></td>
<td>{{ booking.travel_date }}</td>
</tr>

<tr>
<td><b>Amount Paid</b></td>
<td>₹ {{ booking.total_amount }}</td>
</tr>

<tr>
<td><b>Status</b></td>
<td>{{ booking.booking_status }}</td>
</tr>

</table>

<div class="actions">

<a class="btn" href="/invoices/download/{{ booking.invoice.id }}/">
Download Invoice
</a>

<a class="btn" href="/">
Go to Home
</a>

</div>

</div>

</body>
</html>
