<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ package.title }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container mt-5">
<div class="card p-4">

<h2>{{ package.title }}</h2>

{% if package.image %}
<img src="{{ package.image.url }}" style="width:100%;max-height:400px;object-fit:cover;">
{% endif %}

<p class="mt-3"><b>Duration:</b> {{ package.duration }}</p>
<p><b>Price:</b> ₹ {{ package.price }}</p>
<p>{{ package.description }}</p>

<a href="{% url 'book_package' package.id %}" class="btn btn-dark w-100">
Book This Package
</a>

</div>
</div>

</body>
</html>
